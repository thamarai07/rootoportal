ServerName localhost
DocumentRoot /app

<Directory /app>
    AllowOverride All
    Require all granted
    Options -Indexes
</Directory>

# Log errors to stderr (Railway picks these up)
ErrorLog /dev/stderr
CustomLog /dev/stdout combined

# Set PHP error display off, log to stderr
php_flag display_errors off
php_flag log_errors on
php_value error_log /dev/stderr
